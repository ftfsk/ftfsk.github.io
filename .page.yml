media:
  input: public/images
  output: /images

content:
  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    filename: "{primary}.md"
    view:
      fields: [title, pubDate]
    fields:
      - name: title
        label: Title
        type: string

      - name: description
        label: Description
        type: string

      - name: pubDate
        label: Publish Date
        type: date

      - name: body
        label: Body
        type: rich-text